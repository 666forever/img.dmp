<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>7th project</title>
  <meta name="description" content="just an easier way to browse icons for discord servers" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">7th project</p>
        <h1>discord icon dump</h1>
        <p class="subtitle"></p>
      </div>

      <a class="repo-link" href="https://github.com/666forever/img.dmp" target="_blank" rel="noopener">
        github repo
      </a>
    </header>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="search icons..." autocomplete="off" />

      <div class="filters">
        <button class="filter active" data-filter="all">all</button>
        <button class="filter" data-filter="png">png</button>
        <button class="filter" data-filter="gif">gif</button>
        <button class="filter" data-filter="sailor-doll">sailor doll</button>
      </div>
    </section>

    <section class="stats">
      <span id="totalCount">loading</span>
      <span class="hint">click an icon to copy its direct url</span>
    </section>

    <section id="gallery" class="gallery" aria-live="polite"></section>

    <div id="toast" class="toast">copied icon url</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
